name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter pub add share_plus url_launcher path_provider shared_preferences

      - name: Build APK
        run: flutter build apk --release

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: cash-control-app
          path: build/app/outputs/flutter-apk/app-release.apk
